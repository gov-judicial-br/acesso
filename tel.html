const lista = document.getElementById("lista");

function atualizarContador() {
    const total = document.querySelectorAll(".numero").length;
    const ligados = document.querySelectorAll(".numero.ligado").length;

    document.getElementById("total").textContent = total;
    document.getElementById("ligados").textContent = ligados;
    document.getElementById("faltam").textContent = total - ligados;
}

dados
.trim()
.split(/\s+/)
.forEach(numeroOriginal => {

    let numero = numeroOriginal;

    if (numero.startsWith("55")) {
        numero = numero.substring(2);
    }

    const a = document.createElement("a");
    a.href = "tel:" + numero;
    a.textContent = numero;
    a.className = "numero";

    if (localStorage.getItem(numero)) {
        a.classList.add("ligado");
    }

    a.addEventListener("click", () => {
        localStorage.setItem(numero, "1");
        a.classList.add("ligado");
        atualizarContador();
    });

    lista.appendChild(a);
});

atualizarContador();
